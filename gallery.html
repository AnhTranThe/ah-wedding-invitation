<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album Ảnh Cưới - Thế Anh & Lệ Huỳnh</title>
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    /></noscript>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
    /></noscript>
    <link rel="stylesheet" href="./wp-content/themes/assets/gallery.css" />
  </head>
  <body>
    <div class="gallery-header">
      <h1>Our Photobooks</h1>
      <p>Thế Anh & Lệ Huỳnh</p>
      <a href="index.html#album-section" id="backLink">&larr; Quay lại</a>
    </div>

    <div class="container" id="galleryContainer"></div>

    <audio
      src="https://res.cloudinary.com/deneskatf/video/upload/v1782749384/AH.WEDDING/AH.PICS/closetoyou_ttfsxa.mp3"
      loop
      id="audio"
    ></audio>
    <button class="toggleAudio" onclick="toggleAudio()">
      <i class="treble-clef">&#119070;</i>
    </button>

    <script>
      // Disable DevTools on production (allow on localhost)
      if (
        location.hostname !== "localhost" &&
        location.hostname !== "127.0.0.1"
      ) {
        document.addEventListener("contextmenu", (event) =>
          event.preventDefault(),
        );
        document.addEventListener("keydown", function (event) {
          if (
            event.keyCode === 123 ||
            (event.ctrlKey &&
              event.shiftKey &&
              (event.keyCode === 73 || event.keyCode === 74)) ||
            (event.ctrlKey && event.keyCode === 85)
          ) {
            event.preventDefault();
            return false;
          }
        });
        (function () {
          function debug() {
            debugger;
            setTimeout(debug, 50);
          }
          debug();
        })();
      }

      var audio = document.getElementById("audio");
      var toggleAudioBtn = document.querySelector(".toggleAudio");
      audio?.play().catch(function () {});
      toggleAudioBtn?.classList.add("playing");

      function toggleAudio() {
        var el = document.getElementById("audio");
        if (!el) { alert("audio element not found"); return; }
        if (el.paused) {
          el.play().catch(function (e) { alert("play error: " + e); });
          document.querySelector(".toggleAudio")?.classList.add("playing");
        } else {
          el.pause();
          document.querySelector(".toggleAudio")?.classList.remove("playing");
        }
      }

      document
        .getElementById("backLink")
        .addEventListener("click", function (e) {
          sessionStorage.setItem("fromGallery", "true");
          if (document.referrer && document.referrer.includes("index.html")) {
            e.preventDefault();
            history.back();
          }
        });

      function thumbnailUrl(url) {
        var idx = url.indexOf("upload/v");
        if (idx !== -1) {
          return url.slice(0, idx + 7) + "f_auto,q_auto,dpr_auto,w_400,c_fill/" + url.slice(idx + 7);
        }
        return url;
      }

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      function renderAlbum(container, title, imageUrls, caption) {
        var section = document.createElement("div");
        section.className = "album-section";
        section.innerHTML =
          '<h2 class="album-title">' +
          title +
          ' <span class="album-count">(' +
          (imageUrls.length || "sắp ra mắt") +
          ")</span></h2>" +
          (caption ? '<p class="album-caption">' + caption + "</p>" : "");

        if (!imageUrls.length) {
          var placeholder = document.createElement("div");
          placeholder.className = "album-empty";
          placeholder.style.cssText =
            "text-align:center;padding:48px 32px;color:#ccc;font-style:italic;border:2px dashed #e8d5da;border-radius:16px;";
          placeholder.innerHTML =
            '<span style="font-size:2rem;display:block;margin-bottom:8px">📸</span>COMING SOON';
          section.appendChild(placeholder);
          container.appendChild(section);
          return;
        }

        var grid = document.createElement("div");
        grid.className = "gallery-grid";

        imageUrls.forEach(function (url) {
          var a = document.createElement("a");
          a.href = url;
          a.className = "glightbox-gallery";

          var img = document.createElement("img");
          img.loading = "lazy";
          img.src = thumbnailUrl(url);
          img.alt = "";

          a.appendChild(img);
          grid.appendChild(a);
        });

        section.appendChild(grid);
        container.appendChild(section);
      }

      document.addEventListener("DOMContentLoaded", function () {
        var container = document.getElementById("galleryContainer");

        // Fetch Cloudinary albums
        fetch("cloudinary-images.json")
          .then(function (r) {
            if (!r.ok) throw new Error("Not found");
            return r.json();
          })
          .then(function (data) {
            if (data.albums) {
              // Merge OM.EDIT + HOPE.EDIT → Ảnh Cưới
              var wedding = [];
              data.albums.forEach(function (album) {
                if (album.name === "OM.EDIT" || album.name === "HOPE.EDIT") {
                  wedding = wedding.concat(
                    album.assets.map(function (a) {
                      return a.url || a;
                    }),
                  );
                }
              });
              renderAlbum(container, "Wedding Albums ", wedding);

              // NT.PICS → Ảnh cưới Nha Trang
              var nt = data.albums.find(function (a) {
                return a.name === "NT.PICS";
              });
              if (nt)
                renderAlbum(
                  container,
                  "Ảnh cưới Nha Trang",
                  nt.assets.map(function (a) {
                    return a.url || a;
                  }),
                );

              // SG.PICS → Ảnh cưới Sài Gòn
              var sg = data.albums.find(function (a) {
                return a.name === "SG.PICS";
              });
              if (sg)
                renderAlbum(
                  container,
                  "Ảnh cưới Sài Gòn",
                  sg.assets.map(function (a) {
                    return a.url || a;
                  }),
                );

              // MEMORIES.PICS → Ảnh kỉ niệm (last)
              var memories = data.albums.find(function (a) {
                return a.name === "MEMORIES.PICS";
              });
              if (memories) {
                renderAlbum(
                  container,
                  "Ảnh kỉ niệm",
                  memories.assets.map(function (a) {
                    return a.url || a;
                  }),
                  '<i class="font-great-vibe">"Cảm ơn chúng ta đã đồng hành và cùng lưu giữ kỉ niệm"</i>',
                );
              }
            }
          })
          .catch(function () {
            // Fallback: show a message
            var msg = document.createElement("p");
            msg.className = "album-empty";
            msg.textContent = "Không thể tải album ảnh.";
            container.appendChild(msg);
          })
          .finally(function () {
            // Init GLightbox after all images are added
            if (typeof GLightbox !== "undefined") {
              GLightbox({ selector: ".glightbox-gallery" });
            }
          });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
  </body>
</html>
