<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album Ảnh Cưới - Thế Anh & Lệ Huỳnh</title>

    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://s3.ap-southeast-1.amazonaws.com" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    /></noscript>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
    /></noscript>
    <link rel="stylesheet" href="./wp-content/themes/assets/gallery.css" />
    <style>
      .album-section {
        margin-bottom: 48px;
      }
      .album-title {
        font-family: "Playfair Display", serif;
        font-size: 1.6rem;
        color: #d6336c;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 2px solid #f0d5da;
      }
      .album-count {
        font-size: 0.85rem;
        color: #999;
        font-weight: 400;
      }
      .album-empty {
        text-align: center;
        padding: 32px;
        color: #aaa;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="gallery-header">
      <h1>Album Ảnh Cưới</h1>
      <p>Thế Anh & Lệ Huỳnh</p>
      <a href="index.html#album-section" id="backLink">&larr; Quay lại</a>
    </div>

    <div class="container" id="galleryContainer"></div>

    <script
      src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"
      defer
    ></script>
    <script>
      document
        .getElementById("backLink")
        .addEventListener("click", function (e) {
          sessionStorage.setItem("fromGallery", "true");
          if (document.referrer && document.referrer.includes("index.html")) {
            e.preventDefault();
            history.back();
          }
        });

      function thumbnailUrl(url) {
        var idx = url.indexOf("upload/v");
        if (idx !== -1) {
          return url.slice(0, idx + 7) + "w_400,c_fill/" + url.slice(idx + 7);
        }
        return url;
      }

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      function renderAlbum(container, title, imageUrls) {
        var section = document.createElement("div");
        section.className = "album-section";
        section.innerHTML =
          '<h2 class="album-title">' +
          title +
          ' <span class="album-count">(' +
          (imageUrls.length || "sắp ra mắt") +
          ")</span></h2>";

        if (!imageUrls.length) {
          var placeholder = document.createElement("div");
          placeholder.className = "album-empty";
          placeholder.style.cssText =
            "text-align:center;padding:48px 32px;color:#ccc;font-style:italic;border:2px dashed #e8d5da;border-radius:16px;";
          placeholder.innerHTML =
            '<span style="font-size:2rem;display:block;margin-bottom:8px">📸</span>COMING SOON';
          section.appendChild(placeholder);
          container.appendChild(section);
          return;
        }

        var grid = document.createElement("div");
        grid.className = "gallery-grid";

        imageUrls.forEach(function (url) {
          var a = document.createElement("a");
          a.href = url;
          a.className = "glightbox-gallery";

          var img = document.createElement("img");
          img.loading = "lazy";
          img.src = thumbnailUrl(url);
          img.alt = "";

          a.appendChild(img);
          grid.appendChild(a);
        });

        section.appendChild(grid);
        container.appendChild(section);
      }

      document.addEventListener("DOMContentLoaded", function () {
        var container = document.getElementById("galleryContainer");

        // Fetch Cloudinary albums
        fetch("cloudinary-images.json")
          .then(function (r) {
            if (!r.ok) throw new Error("Not found");
            return r.json();
          })
          .then(function (data) {
            if (data.albums) {
              // Merge OM.EDIT + HOPE.EDIT → Ảnh Cưới
              var wedding = [];
              data.albums.forEach(function (album) {
                if (album.name === "OM.EDIT" || album.name === "HOPE.EDIT") {
                  wedding = wedding.concat(album.assets.map(function (a) {
                    return a.url || a;
                  }));
                }
              });
              renderAlbum(container, "Album Ảnh Cưới", wedding);

              // NT.PICS → Ảnh cưới Nha Trang
              var nt = data.albums.find(function (a) { return a.name === "NT.PICS"; });
              if (nt) renderAlbum(container, "Ảnh cưới Nha Trang", nt.assets.map(function (a) { return a.url || a; }));

              // SG.PICS → Ảnh cưới Sài Gòn
              var sg = data.albums.find(function (a) { return a.name === "SG.PICS"; });
              if (sg) renderAlbum(container, "Ảnh cưới Sài Gòn", sg.assets.map(function (a) { return a.url || a; }));

              // MEMORIES.PICS → Ảnh kỉ niệm
              var memories = data.albums.find(function (a) { return a.name === "MEMORIES.PICS"; });
              if (memories) renderAlbum(container, "Ảnh kỉ niệm", memories.assets.map(function (a) { return a.url || a; }));
            }
          })
          .catch(function () {
            // Fallback: show a message
            var msg = document.createElement("p");
            msg.className = "album-empty";
            msg.textContent = "Không thể tải album ảnh.";
            container.appendChild(msg);
          })
          .finally(function () {
            // Init GLightbox after all images are added
            if (typeof GLightbox !== "undefined") {
              GLightbox({ selector: ".glightbox-gallery" });
            }
          });
      });
    </script>
  </body>
</html>
