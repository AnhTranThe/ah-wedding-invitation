<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album Ảnh Cưới - Thế Anh & Lệ Huỳnh</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
    />
    <link rel="stylesheet" href="./wp-content/themes/assets/gallery.css" />
  </head>
  <body>
    <div class="gallery-header">
      <h1>Album Ảnh Cưới</h1>
      <p>Thế Anh & Lệ Huỳnh</p>
      <a href="index.html#album-section-2" id="backLink">&larr; Quay lại</a>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>

    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
    <script>
      document
        .getElementById("backLink")
        .addEventListener("click", function (e) {
          if (document.referrer && document.referrer.includes("index.html")) {
            e.preventDefault();
            history.back();
          }
        });

      var allImages = [
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842450/AH.WEDDING/OM.EDIT/dsc03417_mtpj3g.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842447/AH.WEDDING/OM.EDIT/dsc03286_vw34q6.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842444/AH.WEDDING/OM.EDIT/dsc02787_g2xsgm.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842442/AH.WEDDING/OM.EDIT/dsc02909_whblry.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1782396485/AH.WEDDING/OM.EDIT/dsc02579_ooldmi_btqctp.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842432/AH.WEDDING/OM.EDIT/dsc02504_ys1sqo.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1782396697/AH.WEDDING/OM.EDIT/dsc02836_ogvoel.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842443/AH.WEDDING/OM.EDIT/dsc02930_jghrru.webp",
        "https://res.cloudinary.com/deneskatf/image/upload/v1781842434/AH.WEDDING/OM.EDIT/dsc02558_j06fr9.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/8728.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/8867.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/8742.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/8979.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/8924.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9001.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9043.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9255.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9616.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9514.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9362.webp",
        "https://s3.ap-southeast-1.amazonaws.com/tynab.wedding/image/9554.webp",
      ];

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      document.addEventListener("DOMContentLoaded", function () {
        shuffle(allImages);
        var grid = document.getElementById("galleryGrid");
        allImages.forEach(function (url) {
          var a = document.createElement("a");
          a.href = url;
          a.className = "glightbox-gallery";
          var img = document.createElement("img");
          img.src = url;
          img.alt = "";
          a.appendChild(img);
          grid.appendChild(a);
        });
        GLightbox({ selector: ".glightbox-gallery" });
      });
    </script>
  </body>
</html>
